<!DOCTYPE html>
<html>
<head>
  <title>AutoCrop</title>
</head>
<body>
  <canvas id="c"></canvas>
  <pre id="out" style="word-break:break-all; border:1px solid #ccc; padding:10px; font-size:8px;"></pre>
  <script>
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      canvas.width = img.width;
      canvas.height = img.height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);
      const pixels = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = pixels.data;
      
      let minX = canvas.width, minY = canvas.height, maxX = 0, maxY = 0;
      
      for (let y = 0; y < canvas.height; y++) {
        for (let x = 0; x < canvas.width; x++) {
          const i = (y * canvas.width + x) * 4;
          const alpha = data[i+3];
          const r = data[i], g = data[i+1], b = data[i+2];
          // If not fully transparent and not purely white background... 
          // The uploaded image had white space, let's define non-white and non-transparent
          const isWhite = r > 245 && g > 245 && b > 245;
          if (alpha > 10 && !isWhite) {
             if (x < minX) minX = x;
             if (x > maxX) maxX = x;
             if (y < minY) minY = y;
             if (y > maxY) maxY = y;
          }
        }
      }
      
      // Safety boundary
      minX = Math.max(0, minX - 5);
      minY = Math.max(0, minY - 5);
      maxX = Math.min(canvas.width, maxX + 5);
      maxY = Math.min(canvas.height, maxY + 5);

      const cropWidth = maxX - minX;
      const cropHeight = maxY - minY;
      
      const cropCanvas = document.getElementById('c');
      cropCanvas.width = cropWidth;
      cropCanvas.height = cropHeight;
      const cctx = cropCanvas.getContext('2d');
      cctx.drawImage(img, minX, minY, cropWidth, cropHeight, 0, 0, cropWidth, cropHeight);
      
      const base64 = cropCanvas.toDataURL('image/png');
      document.getElementById('out').innerText = base64;
      console.log("COMPLETE");
    };
    img.src = "amizhdhu-logo.png";
  </script>
</body>
</html>
